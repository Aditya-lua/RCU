name: Lua Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.4

      - name: Run unit tests
        run: |
          cd tests
          chmod +x run_all.sh
          bash run_all.sh
